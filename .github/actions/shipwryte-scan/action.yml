name: 'Shipwryte Scan'
description: 'Free security scanner for AI-generated code'
branding:
  icon: 'shield'
  color: 'red'

inputs:
  path:
    description: 'Path to scan'
    required: false
    default: '.'
  severity:
    description: 'Minimum severity to report (low, medium, high, critical)'
    required: false
    default: 'low'
  fail-on-critical:
    description: 'Fail the workflow if critical issues are found'
    required: false
    default: 'true'
  comment-on-pr:
    description: 'Post results as a PR comment'
    required: false
    default: 'true'

outputs:
  score:
    description: 'Security score (0-100)'
    value: ${{ steps.scan.outputs.score }}
  grade:
    description: 'Security grade (A-F)'
    value: ${{ steps.scan.outputs.grade }}
  critical-count:
    description: 'Number of critical issues found'
    value: ${{ steps.scan.outputs.critical_count }}

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Run Shipwryte Scan
      id: scan
      shell: bash
      run: |
        npx @shipwryte/scan@latest ${{ inputs.path }} \
          --severity ${{ inputs.severity }} \
          --format json > shipwryte-results.json 2>&1 || true

        # Parse results
        SCORE=$(node -e "const r=JSON.parse(require('fs').readFileSync('shipwryte-results.json','utf8')); console.log(r.score || 0)")
        GRADE=$(node -e "const r=JSON.parse(require('fs').readFileSync('shipwryte-results.json','utf8')); console.log(r.grade || 'F')")
        CRITICAL=$(node -e "const r=JSON.parse(require('fs').readFileSync('shipwryte-results.json','utf8')); console.log((r.findings||[]).filter(f=>f.severity==='critical').length)")

        echo "score=$SCORE" >> $GITHUB_OUTPUT
        echo "grade=$GRADE" >> $GITHUB_OUTPUT
        echo "critical_count=$CRITICAL" >> $GITHUB_OUTPUT

    - name: Generate Markdown Report
      shell: bash
      run: |
        npx @shipwryte/scan@latest ${{ inputs.path }} \
          --severity ${{ inputs.severity }} \
          --format markdown > shipwryte-report.md 2>&1 || true

    - name: Comment on PR
      if: inputs.comment-on-pr == 'true' && github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const report = fs.readFileSync('shipwryte-report.md', 'utf8');
          const score = '${{ steps.scan.outputs.score }}';
          const grade = '${{ steps.scan.outputs.grade }}';

          const body = `## 🛡️ Shipwryte Security Scan

          **Score: ${score}/100 (${grade})**

          ${report}

          ---
          *Scanned by [@shipwryte/scan](https://github.com/carsonst/shipwryte-scan) — free security scanner for AI-generated code*
          *Need a deeper audit? [Book a human review](https://shipwryte.com)*`;

          // Find existing comment to update
          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });
          const existing = comments.find(c => c.body.includes('Shipwryte Security Scan'));

          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
          }

    - name: Fail on critical
      if: inputs.fail-on-critical == 'true'
      shell: bash
      run: |
        CRITICAL=${{ steps.scan.outputs.critical_count }}
        if [ "$CRITICAL" -gt 0 ]; then
          echo "::error::Shipwryte found $CRITICAL critical security issue(s). Failing build."
          exit 1
        fi
