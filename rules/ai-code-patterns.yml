rules:
  - id: hardcoded-api-key-in-source
    patterns:
      - pattern-either:
          - pattern: |
              $KEY = "sk-..."
          - pattern: |
              $KEY = "sk_live_..."
          - pattern: |
              $KEY = "AKIA..."
          - pattern: |
              $KEY = "ghp_..."
    message: >
      Hardcoded API key found in source code. AI code generators often place
      API keys directly in source files. Move this to an environment variable.
    severity: ERROR
    languages: [javascript, typescript, python]
    metadata:
      category: security
      technology: [ai-generated]
      confidence: HIGH

  - id: cors-allow-all-origins
    patterns:
      - pattern-either:
          - pattern: |
              cors({ origin: "*" })
          - pattern: |
              cors({ origin: true })
          - pattern: |
              "Access-Control-Allow-Origin": "*"
    message: >
      CORS is configured to allow all origins. This is a common pattern in
      AI-generated code. Restrict to specific trusted domains.
    severity: WARNING
    languages: [javascript, typescript]
    metadata:
      category: security
      technology: [ai-generated]

  - id: raw-sql-concatenation
    patterns:
      - pattern-either:
          - pattern: |
              $DB.query(`... ${$INPUT} ...`)
          - pattern: |
              $DB.query("..." + $INPUT + "...")
          - pattern: |
              $DB.execute(`... ${$INPUT} ...`)
    message: >
      SQL query uses string interpolation. This is a SQL injection vulnerability.
      Use parameterized queries instead.
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      category: security
      technology: [ai-generated]
      confidence: HIGH

  - id: express-no-helmet
    patterns:
      - pattern: |
          const $APP = express()
      - pattern-not-inside: |
          ...
          $APP.use(helmet(...))
          ...
    message: >
      Express app created without helmet middleware. AI code generators often
      skip security headers. Add helmet() for basic protection.
    severity: WARNING
    languages: [javascript, typescript]
    metadata:
      category: security
      technology: [ai-generated]

  - id: password-without-hashing
    patterns:
      - pattern-either:
          - pattern: |
              { password: $REQ.body.password }
          - pattern: |
              password = $REQ.body.password
    message: >
      Password appears to be stored without hashing. Always hash passwords
      with bcrypt, argon2, or scrypt before storing.
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      category: security
      technology: [ai-generated]
      confidence: MEDIUM

  - id: jwt-weak-secret
    patterns:
      - pattern: |
          jwt.sign($PAYLOAD, "...")
    message: >
      JWT signed with a hardcoded string secret. Use a strong, random secret
      from environment variables.
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      category: security
      technology: [ai-generated]

  - id: unvalidated-redirect
    patterns:
      - pattern-either:
          - pattern: |
              res.redirect($REQ.query.$URL)
          - pattern: |
              res.redirect($REQ.body.$URL)
    message: >
      Redirect URL comes directly from user input. This enables open redirect
      attacks. Validate against an allowlist.
    severity: WARNING
    languages: [javascript, typescript]
    metadata:
      category: security
      technology: [ai-generated]

  - id: exposed-admin-route
    patterns:
      - pattern-either:
          - pattern: |
              $APP.get("/admin/...", ...)
          - pattern: |
              $APP.get("/debug/...", ...)
          - pattern: |
              $ROUTER.get("/admin/...", ...)
    message: >
      Admin/debug route detected without apparent authentication middleware.
      AI generators often create admin routes without auth checks.
    severity: WARNING
    languages: [javascript, typescript]
    metadata:
      category: security
      technology: [ai-generated]
